name: talk
description: "星语物语 (StarTale) - 一款社交模拟手机应用"
publish_to: 'none'
version: 1.0.3+3

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  go_router: ^13.0.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  flutter_animate: ^4.3.0
  cached_network_image: ^3.3.1

  uuid: ^4.2.2
  intl: ^0.20.2
  logger: ^2.0.2+1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  custom_lint: ^0.6.2
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
